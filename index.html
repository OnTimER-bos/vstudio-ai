<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>V-STUDIO WORKING</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020205;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#05050a;
padding:20px;
border-right:1px solid #222;
}

.sidebar h2{
color:#6366f1;
}

.sidebar button{
width:100%;
margin-top:10px;
background:#111;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:20px;
border-bottom:1px solid #222;
}

.workspace{
flex:1;
padding:30px;
overflow:auto;
}

textarea{
width:100%;
height:120px;
background:#0b0b12;
color:white;
border:1px solid #333;
border-radius:8px;
padding:10px;
}

.generate{
margin-top:10px;
background:#6366f1;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>V-STUDIO</h2>

<button onclick="openTab('dashboard')">Dashboard</button> <button onclick="openTab('image')">Image Generator</button> <button onclick="openTab('caption')">Caption AI</button>

</div>

<div class="main">

<div class="header">
AI Creative Studio
</div>

<div class="workspace" id="workspace">

<h2>Welcome</h2>
<p>System Ready</p>

</div>

</div>

<script>

function openTab(tab){

if(tab==="dashboard"){

workspace.innerHTML=`
<h2>Dashboard</h2>
<p>Tools ready</p>
`

}

if(tab==="image"){

workspace.innerHTML=`

<h2>Image Generator</h2>

<textarea id="prompt" placeholder="describe image"></textarea>

<button class="generate" onclick="generate()">Generate</button>

<div class="grid" id="images"></div>

`

}

  const models = [

(prompt)=>`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`,

(prompt)=>`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?model=flux`,

(prompt)=>`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?model=sdxl`,

(prompt)=>`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?model=turbo`,

(prompt)=>`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?model=midjourney`,

(prompt)=>`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${Math.random()}`,

(prompt)=>`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?style=anime`,

(prompt)=>`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?style=photo`,

(prompt)=>`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?style=cinematic`,

(prompt)=>`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?style=3d`
]

function generate(){

let prompt=document.getElementById("prompt").value
let images=document.getElementById("images")

images.innerHTML="Generating..."

for(let i=0;i<4;i++){

let model=models[Math.floor(Math.random()*models.length)]

let url=model(prompt)

let img=new Image()

img.onload=()=>{
images.appendChild(img)
}

img.onerror=()=>{
console.log("model failed, retry")
generate()
}

img.src=url
img.style.width="100%"

}

}

if(tab==="caption"){

workspace.innerHTML=`

<h2>Caption Generator</h2>

<textarea id="prompt"></textarea>

<button class="generate" onclick="caption()">Generate</button>

<div id="result"></div>

`

}

}

function generate(){

let prompt=document.getElementById("prompt").value

let images=document.getElementById("images")

images.innerHTML=""

for(let i=0;i<4;i++){

let url="https://picsum.photos/seed/"+encodeURIComponent(prompt+i)+"/600/600"

let div=document.createElement("div")

div.innerHTML=`<img src="${url}">`

images.appendChild(div)

}

}

function caption(){

let p=document.getElementById("prompt").value

result.innerText=
"☕ "+p+" — perfect coffee moment."

}

</script>

</body>

</html>
