<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>V-STUDIO AI PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020205;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#05050a;
padding:20px;
border-right:1px solid #222;
}

.sidebar h2{
color:#6366f1;
}

.sidebar button{
width:100%;
margin-top:10px;
background:#111;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.sidebar button:hover{
background:#6366f1;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:20px;
border-bottom:1px solid #222;
}

.workspace{
flex:1;
padding:30px;
overflow:auto;
}

textarea{
width:100%;
height:120px;
background:#0b0b12;
color:white;
border:1px solid #333;
border-radius:8px;
padding:10px;
}

.generate{
margin-top:10px;
background:#6366f1;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

.card{
margin-top:20px;
background:#0b0b12;
padding:20px;
border-radius:10px;
}

.progress{
height:8px;
background:#222;
border-radius:6px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:#6366f1;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

img{
width:100%;
border-radius:10px;
}

.download{
margin-top:5px;
background:#111;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.history img{
width:120px;
margin:5px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>V-STUDIO</h2>

<button onclick="openTab('dashboard')">Dashboard</button> <button onclick="openTab('image')">AI Image</button> <button onclick="openTab('video')">Video Prompt</button> <button onclick="openTab('caption')">Caption AI</button> <button onclick="openTab('history')">History</button>

</div>

<div class="main">

<div class="header">
AI Creative Studio
</div>

<div class="workspace" id="workspace">

<h2>Welcome</h2>
<p>V-STUDIO AI Ready 🚀</p>

</div>

</div>

<script>

let historyImages=[]

function openTab(tab){

if(tab==="dashboard"){

workspace.innerHTML=`

<h2>Dashboard</h2>

<p>Tools Available</p>

<ul>
<li>AI Image Generator</li>
<li>Video Prompt Generator</li>
<li>Caption Generator</li>
<li>History</li>
</ul>

`

}

if(tab==="image"){

workspace.innerHTML=`

<h2>AI Image Generator</h2>

<textarea id="prompt" placeholder="Describe image..."></textarea>

<button class="generate" onclick="generate()">Generate 4 Images</button>

<div class="card">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="grid" id="images"></div>

</div>

`

}

if(tab==="video"){

workspace.innerHTML=`

<h2>Video Prompt Generator</h2>

<textarea id="prompt"></textarea>

<button class="generate" onclick="video()">Generate</button>

<div class="card" id="result"></div>

`

}

if(tab==="caption"){

workspace.innerHTML=`

<h2>Instagram Caption Generator</h2>

<textarea id="prompt"></textarea>

<button class="generate" onclick="caption()">Generate</button>

<div class="card" id="result"></div>

`

}

if(tab==="history"){

let html="<h2>History</h2><div class='history'>"

historyImages.forEach(img=>{
html+=`<img src="${img}">`
})

html+="</div>"

workspace.innerHTML=html

}

}

function generate(){

let prompt=document.getElementById("prompt").value

let bar=document.getElementById("bar")

let images=document.getElementById("images")

images.innerHTML=""

let progress=0

let loader=setInterval(()=>{

progress+=5
bar.style.width=progress+"%"

if(progress>=90){
clearInterval(loader)
}

},200)

for(let i=0;i<4;i++){

let url="https://image.pollinations.ai/prompt/"
+encodeURIComponent(prompt)
+"?seed="+Math.random()

let div=document.createElement("div")

div.innerHTML=`

<img src="${url}">

<button class="download" onclick="download('${url}')">Download</button>

`

images.appendChild(div)

historyImages.push(url)

}

setTimeout(()=>{
bar.style.width="100%"
},2000)

}

function download(url){

let a=document.createElement("a")
a.href=url
a.download="ai-image.png"
a.click()

}

function video(){

let p=document.getElementById("prompt").value

result.innerText=
"Cinematic video scene of "+p+", dramatic lighting, 4k film look"

}

function caption(){

let p=document.getElementById("prompt").value

result.innerText=
"☕ Experience the vibe!\n\n"+p+" — the perfect moment for coffee lovers."

}

</script>

</body>
</html>
