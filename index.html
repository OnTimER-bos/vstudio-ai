<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>V-STUDIO AI IMAGE</title>

<style>

body{
background:#020205;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

input{
width:60%;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
background:#4f46e5;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-left:10px;
}

img{
margin-top:30px;
max-width:500px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>V-STUDIO AI Image Generator</h1>

<input id="prompt" placeholder="Describe image">

<button onclick="generate()">Generate</button>

<br>

<img id="image">

<script>

function generate(){

let prompt=document.getElementById("prompt").value

let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt)

document.getElementById("image").src=url

}

</script>

</body>

</html>
