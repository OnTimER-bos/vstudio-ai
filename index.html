<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>V-STUDIO AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020205;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#05050a;
padding:20px;
border-right:1px solid #222;
}

.sidebar h2{
color:#6366f1;
}

.sidebar button{
width:100%;
margin-top:10px;
background:#111;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:20px;
border-bottom:1px solid #222;
}

.workspace{
flex:1;
padding:30px;
overflow:auto;
}

textarea{
width:100%;
height:120px;
background:#0b0b12;
color:white;
border:1px solid #333;
border-radius:8px;
padding:10px;
}

button.generate{
margin-top:10px;
background:#6366f1;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

img{
margin-top:20px;
width:100%;
max-width:600px;
border-radius:10px;
}

.status{
margin-top:10px;
color:#aaa;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>V-STUDIO</h2>

<button onclick="openTab('dashboard')">Dashboard</button> <button onclick="openTab('image')">AI Image</button>

</div>

<div class="main">

<div class="header">
AI Creative Studio
</div>

<div class="workspace" id="workspace">

<h2>Welcome</h2>
<p>System Ready</p>

</div>

</div>

<script>

let API_KEY="PASTE_API_KEY_DISINI"

function openTab(tab){

if(tab==="dashboard"){

workspace.innerHTML=`
<h2>Dashboard</h2>
<p>AI Generator Ready</p>
`

}

if(tab==="image"){

workspace.innerHTML=`

<h2>AI Image Generator</h2>

<textarea id="prompt" placeholder="describe image"></textarea>

<button class="generate" onclick="generate()">Generate Image</button>

<div class="status" id="status"></div>

<img id="image">

`

}

}

async function generate(){

let API_KEY = prompt("Masukkan HuggingFace API Key")

let promptText=document.getElementById("prompt").value
let status=document.getElementById("status")
let image=document.getElementById("image")

status.innerText="Generating image..."

let response=await fetch(
"https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-2",
{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs:promptText
})
})

let blob=await response.blob()

let url=URL.createObjectURL(blob)

image.src=url

status.innerText="Image ready"

}
}

</script>

</body>

</html>
