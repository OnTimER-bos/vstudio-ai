<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>V-STUDIO AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020205;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#05050a;
padding:20px;
border-right:1px solid #222;
}

.sidebar h2{
color:#6366f1;
}

.sidebar button{
width:100%;
margin-top:10px;
background:#111;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.sidebar button:hover{
background:#6366f1;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:20px;
border-bottom:1px solid #222;
}

.workspace{
flex:1;
padding:30px;
overflow:auto;
}

textarea{
width:100%;
height:120px;
background:#0b0b12;
color:white;
border:1px solid #333;
border-radius:8px;
padding:10px;
}

.generate{
margin-top:10px;
background:#6366f1;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

.card{
margin-top:20px;
background:#0b0b12;
padding:20px;
border-radius:10px;
}

.progress{
height:8px;
background:#222;
border-radius:6px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:#6366f1;
}

img{
margin-top:20px;
max-width:100%;
border-radius:10px;
}

.queue{
margin-top:10px;
font-size:14px;
color:#aaa;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>V-STUDIO</h2>

<button onclick="openTab('dashboard')">Dashboard</button> <button onclick="openTab('image')">AI Image</button>

</div>

<div class="main">

<div class="header">
AI Creative Studio
</div>

<div class="workspace" id="workspace">

<h2>Welcome</h2>
<p>AI tools ready 🚀</p>

</div>

</div>

<script>

let queue=[]
let generating=false

function openTab(tab){

if(tab==="dashboard"){

document.getElementById("workspace").innerHTML=`

<h2>Dashboard</h2>

<p>AI Studio Ready</p>

<ul>
<li>AI Image Generator</li>
<li>Queue System</li>
<li>Progress Loading</li>
</ul>

`

}

if(tab==="image"){

document.getElementById("workspace").innerHTML=`

<h2>AI Image Generator</h2>

<textarea id="prompt" placeholder="Describe image..."></textarea>

<button class="generate" onclick="addQueue()">Generate Image</button>

<div class="queue" id="queue"></div>

<div class="card">

<div id="status"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<img id="image">

</div>

`

}

}

function addQueue(){

let prompt=document.getElementById("prompt").value

queue.push(prompt)

updateQueue()

processQueue()

}

function updateQueue(){

document.getElementById("queue").innerText=
"Queue: "+queue.length+" image task"

}

function processQueue(){

if(generating) return

if(queue.length===0) return

generating=true

let prompt=queue.shift()

updateQueue()

generateImage(prompt)

}

function generateImage(prompt){

let img=document.getElementById("image")

let status=document.getElementById("status")

let bar=document.getElementById("bar")

status.innerText="Generating image..."

let progress=0

let interval=setInterval(()=>{

progress+=5

bar.style.width=progress+"%"

if(progress>=90){
clearInterval(interval)
}

},200)

let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt)+"?seed="+Math.random()

img.onload=function(){

clearInterval(interval)

bar.style.width="100%"

status.innerText="Image ready"

generating=false

setTimeout(()=>{
bar.style.width="0%"
processQueue()
},1000)

}

img.onerror=function(){

status.innerText="Error loading image... retrying"

setTimeout(()=>{

generateImage(prompt)

},2000)

}

img.src=url

}

</script>

</body>
</html>
