<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>V-STUDIO AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020205;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#05050a;
padding:20px;
border-right:1px solid #222;
}

.sidebar h2{
color:#6366f1;
}

.sidebar button{
width:100%;
margin-top:10px;
background:#111;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:20px;
border-bottom:1px solid #222;
}

.workspace{
flex:1;
padding:30px;
overflow:auto;
}

textarea{
width:100%;
height:120px;
background:#0b0b12;
color:white;
border:1px solid #333;
border-radius:8px;
padding:10px;
}

.generate{
margin-top:10px;
background:#6366f1;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

img{
width:100%;
border-radius:10px;
}

.status{
margin-top:10px;
color:#aaa;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>V-STUDIO</h2>

<button onclick="openTab('dashboard')">Dashboard</button> <button onclick="openTab('image')">AI Image</button> <button onclick="openTab('caption')">Caption AI</button>

</div>

<div class="main">

<div class="header">
AI Creative Studio
</div>

<div class="workspace" id="workspace">

<h2>Welcome</h2>
<p>System Ready</p>

</div>

</div>

<script>

const styles=[

"cinematic lighting",
"ultra realistic photo",
"anime style",
"3d render",
"studio photography",
"fantasy art",
"digital painting",
"concept art",
"isometric 3d",
"cyberpunk style"

]

function openTab(tab){

if(tab==="dashboard"){

workspace.innerHTML=`

<h2>Dashboard</h2>

<p>Tools Ready</p>

<ul>
<li>AI Image Generator</li>
<li>Caption Generator</li>
<li>10 Random AI Styles</li>
</ul>

`

}

if(tab==="image"){

workspace.innerHTML=`

<h2>AI Image Generator</h2>

<textarea id="prompt" placeholder="describe image"></textarea>

<button class="generate" onclick="generate()">Generate</button>

<div class="status" id="status"></div>

<div class="grid" id="images"></div>

`

}

if(tab==="caption"){

workspace.innerHTML=`

<h2>Caption Generator</h2>

<textarea id="prompt"></textarea>

<button class="generate" onclick="caption()">Generate</button>

<div id="result"></div>

`

}

}

function generate(){

let prompt=document.getElementById("prompt").value
let images=document.getElementById("images")
let status=document.getElementById("status")

images.innerHTML=""
status.innerText="Generating images..."

let done=0

for(let i=0;i<4;i++){

let style=styles[Math.floor(Math.random()*styles.length)]

let fullPrompt=prompt+" "+style

let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(fullPrompt)+"?seed="+Math.random()

let img=new Image()

img.onload=function(){

done++

images.appendChild(img)

status.innerText=done+" / 4 images ready"

}

img.onerror=function(){

status.innerText="retrying..."

setTimeout(()=>{
img.src=url+"&retry="+Math.random()
},2000)

}

img.src=url

}

}

function caption(){

let p=document.getElementById("prompt").value

result.innerText=
"☕ "+p+" — the perfect moment for coffee lovers."

}

</script>

</body>

</html>
