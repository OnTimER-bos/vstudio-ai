<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>V-STUDIO AI</title>

<style>

body{
background:#020205;
color:white;
font-family:Arial;
margin:0;
}

header{
padding:20px;
background:#05050a;
border-bottom:1px solid #222;
}

h1{
margin:0;
color:#6366f1;
}

.container{
max-width:800px;
margin:auto;
padding:40px;
}

textarea{
width:100%;
height:120px;
background:#0b0b12;
color:white;
border:1px solid #333;
border-radius:8px;
padding:10px;
}

button{
margin-top:10px;
background:#4f46e5;
border:none;
color:white;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:30px;
background:#0b0b12;
padding:20px;
border-radius:10px;
}

.toolbox{
display:flex;
gap:10px;
margin-bottom:20px;
}

</style>

</head>

<body>

<header>
<h1>V-STUDIO AI</h1>
</header>

<div class="container">

<div class="toolbox">

<button onclick="mode='text'">Text AI</button>
<button onclick="mode='image'">Image Prompt</button>
<button onclick="mode='video'">Video Prompt</button>

</div>

<textarea id="prompt" placeholder="Enter your prompt..."></textarea>

<br>

<button onclick="generate()">Generate</button>

<div class="result" id="result">

AI result will appear here...

</div>

</div>

<script>

let mode="text"

function generate(){

let prompt=document.getElementById("prompt").value
let result=""

if(mode==="text"){
result="AI Text Idea:\\n\\nWrite an article about: "+prompt
}

if(mode==="image"){
result="AI Image Prompt:\\n\\nUltra realistic photo of "+prompt+", cinematic lighting, 8k"
}

if(mode==="video"){
result="AI Video Prompt:\\n\\nCinematic video scene of "+prompt+", dramatic lighting"
}

document.getElementById("result").innerText=result

}

</script>

</body>

</html>
